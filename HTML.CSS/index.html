<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZAKIY PLAYLIST</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css">

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2><i class="fa-brands fa-spotify"></i> ZAKIY PLAYLIST</h2>

    <ul>
      <li><i class="fa-solid fa-house"></i> Home</li>
      <li><i class="fa-solid fa-magnifying-glass"></i> Search</li>
      <li><i class="fa-solid fa-book"></i> Library</li>
    </ul>

    <div class="playlist">
      <h3>Playlist</h3>
      <p>My Favorite Songs</p>
      <p>Chill Night</p>
      <p>Top Hits 2026</p>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">

    <!-- Navbar -->
    <div class="navbar">
      <input type="text" placeholder="Cari lagu...">
      <button>Login</button>
    </div>

    <!-- Banner -->
    <div class="banner">
      <h1>Feel The Music</h1>
      <p>Dengarkan musik favoritmu kapan saja.</p>
    </div>

    <!-- Music Cards -->
    <h2 class="title">Music Populer</h2>

    <div class="cards">

      <div class="card">
        <img src="1.jpeg" alt="music">
        <h3>Lagu Galau</h3>
      </div>

      <div class="card">
        <img src="2.jpeg" alt="music">
        <h3>Sholawat</h3>
      </div>

      <div class="card">
        <img src="3.jpeg" alt="music">
        <h3>Breakbeat</h3>
      </div>

      <div class="card">
        <img src="4.jpeg" alt="music">
        <h3>DJ Veronica ko</h3>
      </div>

    </div>
  </div>

</body>
</html>
